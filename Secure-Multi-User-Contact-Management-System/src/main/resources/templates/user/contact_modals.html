<div data-th-fragment="contact">

<!-- View Contact Modal -->
<div id="view_contact_modal" tabindex="-1" aria-hidden="true"
     class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 flex justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full">

  <!-- Backdrop -->
  <div class="fixed inset-0 bg-black/40 dark:bg-black/60 backdrop-blur-sm" onclick="closeContactModal()"></div>

  <div class="relative p-4 w-full max-w-lg max-h-full z-10">

    <!-- Modal Card -->
    <div class="relative bg-white dark:bg-gray-800 rounded-2xl shadow-2xl dark:shadow-black/50 border border-gray-100 dark:border-gray-700/50 overflow-hidden">

      <!-- Modal Header -->
      <div class="flex items-center justify-between px-6 py-5 border-b border-gray-100 dark:border-gray-700/40">

        <div class="flex items-center gap-4">
          <!-- Contact Avatar -->
          <div class="relative">
            <img id="contact_image"
                 class="w-14 h-14 rounded-xl object-cover border-2 border-gray-100 dark:border-gray-700 shadow-sm"
                 src=""
                 onerror="this.src='https://static.vecteezy.com/system/resources/previews/020/765/399/non_2x/default-profile-account-unknown-icon-black-silhouette-free-vector.jpg'"
                 alt="Contact Image">
            <span class="absolute -bottom-1 -right-1 w-4 h-4 bg-emerald-400 rounded-full border-2 border-white dark:border-gray-800"></span>
          </div>

          <!-- Name & Email -->
          <div>
            <h3 id="contact_name" class="text-base font-bold text-gray-900 dark:text-white" style="font-family:'Syne',sans-serif;"></h3>
            <p id="contact_email" class="text-sm text-gray-400 dark:text-gray-500"></p>
          </div>
        </div>

        <!-- Close Button -->
        <button type="button"
                onclick="closeContactModal()"
                class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-gray-600 dark:hover:text-gray-300 transition-colors duration-200">
          <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
          <span class="sr-only">Close modal</span>
        </button>
      </div>

      <!-- Modal Body -->
      <div class="px-6 py-5 space-y-3">

        <!-- Phone -->
        <div class="flex items-center gap-4 p-3 rounded-xl bg-gray-50 dark:bg-gray-700/30">
          <div class="w-8 h-8 rounded-lg bg-[#4F6EF7]/10 flex items-center justify-center flex-shrink-0">
            <i class="fa-solid fa-phone text-[#4F6EF7] text-xs"></i>
          </div>
          <div>
            <p class="text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-0.5">Phone</p>
            <p id="contact_phone" class="text-sm font-medium text-gray-900 dark:text-white"></p>
          </div>
        </div>

        <!-- Address -->
        <div class="flex items-start gap-4 p-3 rounded-xl bg-gray-50 dark:bg-gray-700/30">
          <div class="w-8 h-8 rounded-lg bg-[#4F6EF7]/10 flex items-center justify-center flex-shrink-0 mt-0.5">
            <i class="fa-solid fa-location-dot text-[#4F6EF7] text-xs"></i>
          </div>
          <div>
            <p class="text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-0.5">Address</p>
            <p id="contact_address" class="text-sm font-medium text-gray-900 dark:text-white"></p>
          </div>
        </div>

        <!-- About / Description -->
        <div class="flex items-start gap-4 p-3 rounded-xl bg-gray-50 dark:bg-gray-700/30">
          <div class="w-8 h-8 rounded-lg bg-[#4F6EF7]/10 flex items-center justify-center flex-shrink-0 mt-0.5">
            <i class="fa-solid fa-user text-[#4F6EF7] text-xs"></i>
          </div>
          <div>
            <p class="text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-0.5">About</p>
            <p id="contact_about" class="text-sm font-medium text-gray-900 dark:text-white"></p>
          </div>
        </div>

        <!-- Favourite -->
        <div class="flex items-center gap-4 p-3 rounded-xl bg-gray-50 dark:bg-gray-700/30">
          <div class="w-8 h-8 rounded-lg bg-amber-50 dark:bg-amber-900/20 flex items-center justify-center flex-shrink-0">
            <i class="fa-solid fa-star text-amber-400 text-xs"></i>
          </div>
          <div>
            <p class="text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-0.5">Favourite</p>
            <p id="contact_favorite" class="text-sm font-medium text-gray-900 dark:text-white"></p>
          </div>
        </div>

        <!-- Website -->
        <div class="flex items-center gap-4 p-3 rounded-xl bg-gray-50 dark:bg-gray-700/30">
          <div class="w-8 h-8 rounded-lg bg-[#4F6EF7]/10 flex items-center justify-center flex-shrink-0">
            <i class="fa-solid fa-earth-americas text-[#4F6EF7] text-xs"></i>
          </div>
          <div>
            <p class="text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-0.5">Website</p>
            <a id="contact_website" class="text-sm font-medium text-[#4F6EF7] hover:underline" target="_blank"></a>
          </div>
        </div>

        <!-- LinkedIn -->
        <div class="flex items-center gap-4 p-3 rounded-xl bg-gray-50 dark:bg-gray-700/30">
          <div class="w-8 h-8 rounded-lg bg-blue-50 dark:bg-blue-900/20 flex items-center justify-center flex-shrink-0">
            <i class="fa-brands fa-linkedin-in text-blue-600 text-xs"></i>
          </div>
          <div>
            <p class="text-xs font-semibold text-gray-400 dark:text-gray-500 uppercase tracking-wider mb-0.5">LinkedIn</p>
            <a id="contact_linkedIn" class="text-sm font-medium text-blue-600 hover:underline" target="_blank"></a>
          </div>
        </div>

      </div>

      <!-- Modal Footer -->
      <div class="px-6 py-4 border-t border-gray-100 dark:border-gray-700/40 flex justify-end">
        <button type="button"
                onclick="closeContactModal()"
                class="px-4 py-2 text-sm font-semibold text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-xl transition-colors duration-200">
          Close
        </button>
      </div>

    </div>
  </div>
</div>

</div>

<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{:: #content}, ~{:: title})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>search page</title>
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
    <link rel="stylesheet" data-th-href="@{'/css/output.css'}">
</head>
<body>

<div id="content">

  <!-- Sidebar -->
  <div th:if="${loggedInUser}">
    <div th:replace="~{user/sidebar :: sidebar}"></div>
  </div>

  <!-- Main Content -->
  <div class="p-6 pt-8">

    <!-- Page Header -->
    <div class="mb-6">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white" style="font-family:'Syne',sans-serif;">Search Results</h1>
      <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">
        <span class="font-semibold text-[#4F6EF7]" data-th-text="${pageContacts.totalElements}">0</span> result(s) found
      </p>
    </div>

    <!-- Card Container -->
    <div class="bg-white dark:bg-gray-800/60 rounded-2xl border border-gray-100 dark:border-gray-700/40 shadow-sm overflow-hidden">

      <!-- Search Bar -->
      <div class="p-5 border-b border-gray-100 dark:border-gray-700/40">
        <form data-th-object="${contactSearchForm}" data-th-action="@{/user/contacts/search}" class="flex flex-wrap items-center gap-3">

          <select data-th-field="*{field}" name="field"
                  class="bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-300 text-sm rounded-xl focus:ring-2 focus:ring-[#4F6EF7] focus:border-[#4F6EF7] px-3 py-2.5 transition-colors duration-200">
            <option selected value="">Select Field</option>
            <option value="name">Name</option>
            <option value="phone">Phone</option>
            <option value="email">Email</option>
          </select>

          <div class="relative">
            <div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
              <i class="fa-solid fa-magnifying-glass text-gray-400 text-sm"></i>
            </div>
            <input data-th-field="*{value}" type="text" placeholder="Search contacts..."
                   class="bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 text-gray-900 dark:text-white text-sm rounded-xl focus:ring-2 focus:ring-[#4F6EF7] focus:border-[#4F6EF7] block w-full max-w-xs pl-10 pr-4 py-2.5 placeholder-gray-400 dark:placeholder-gray-500 transition-colors duration-200" />
          </div>

          <button type="submit"
                  class="px-4 py-2.5 text-sm font-semibold text-white bg-[#4F6EF7] hover:bg-[#3B57E0] rounded-xl shadow-sm shadow-[#4F6EF7]/20 transition-all duration-200">
            Search
          </button>

        </form>
      </div>

      <!-- Table -->
      <div class="overflow-x-auto">
        <table data-th-if="${pageContacts.totalElements>0}" class="w-full text-sm text-left">

          <thead class="bg-gray-50 dark:bg-gray-700/30 border-b border-gray-100 dark:border-gray-700/40">
            <tr>
              <th class="px-6 py-4 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Contact</th>
              <th class="px-6 py-4 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Phone</th>
              <th class="px-6 py-4 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Links</th>
              <th class="px-6 py-4 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Actions</th>
            </tr>
          </thead>

          <tbody class="divide-y divide-gray-100 dark:divide-gray-700/40">
            <tr data-th-object="${c}"
                data-th-each="c : ${pageContacts.getContent()}"
                class="bg-white dark:bg-transparent hover:bg-gray-50 dark:hover:bg-gray-700/20 transition-colors duration-150">

              <!-- Name + Avatar -->
              <td class="px-6 py-4">
                <div class="flex items-center gap-3">
                  <img class="w-10 h-10 rounded-xl object-cover border border-gray-100 dark:border-gray-700 shadow-sm"
                       data-th-src="@{*{picture}}"
                       onerror="this.src='https://static.vecteezy.com/system/resources/previews/020/765/399/non_2x/default-profile-account-unknown-icon-black-silhouette-free-vector.jpg'"
                       alt="Profile picture">
                  <div>
                    <p class="text-sm font-semibold text-gray-900 dark:text-white" data-th-text="*{name}"></p>
                    <p class="text-xs text-gray-400 dark:text-gray-500" data-th-text="*{email}"></p>
                  </div>
                </div>
              </td>

              <!-- Phone -->
              <td class="px-6 py-4">
                <div class="flex items-center gap-2 text-gray-600 dark:text-gray-300">
                  <i class="fa-solid fa-phone text-[#4F6EF7] text-xs"></i>
                  <span class="text-sm" data-th-text="*{phoneNumber}"></span>
                </div>
              </td>

              <!-- Links + Favourite -->
              <td class="px-6 py-4">
                <div class="flex items-center gap-2">
                  <span data-th-if="*{favorite}"
                        class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold bg-amber-50 dark:bg-amber-900/20 text-amber-500">
                    <i class="fa-solid fa-star text-[10px]"></i> Fav
                  </span>
                  <a th:if="*{websiteLink != null and websiteLink != ''}" th:href="@{*{websiteLink}}" target="_blank"
                     class="w-7 h-7 flex items-center justify-center rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-[#4F6EF7]/10 hover:text-[#4F6EF7] text-gray-500 dark:text-gray-400 transition-colors">
                    <i class="fa-solid fa-link text-xs"></i>
                  </a>
                  <a th:if="*{linkedInLink != null and linkedInLink != ''}" th:href="@{*{linkedInLink}}" target="_blank"
                     class="w-7 h-7 flex items-center justify-center rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-blue-50 hover:text-blue-600 text-gray-500 dark:text-gray-400 transition-colors">
                    <i class="fa-brands fa-linkedin text-xs"></i>
                  </a>
                  <span th:if="*{(websiteLink == null or websiteLink == '') and (linkedInLink == null or linkedInLink == '')}"
                        class="text-xs text-gray-400 dark:text-gray-500">—</span>
                </div>
              </td>

              <!-- Actions -->
              <td class="px-6 py-4">
                <div class="flex items-center gap-1">
                  <a href=""
                     class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-400 hover:bg-red-50 dark:hover:bg-red-900/20 hover:text-red-500 transition-colors duration-200">
                    <i class="fa-solid fa-trash-can text-sm"></i>
                  </a>
                  <a href=""
                     class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-400 hover:bg-[#4F6EF7]/10 hover:text-[#4F6EF7] transition-colors duration-200">
                    <i class="fa-solid fa-pen text-sm"></i>
                  </a>
                  <a href=""
                     class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-400 hover:bg-emerald-50 dark:hover:bg-emerald-900/20 hover:text-emerald-500 transition-colors duration-200">
                    <i class="fa-solid fa-eye text-sm"></i>
                  </a>
                </div>
              </td>

            </tr>
          </tbody>
        </table>
      </div>

      <!-- No Results -->
      <div data-th-if="${pageContacts.totalElements<=0}"
           class="flex flex-col items-center justify-center py-16 text-center">
        <div class="w-16 h-16 rounded-2xl bg-gray-100 dark:bg-gray-700 flex items-center justify-center mb-4">
          <i class="fa-solid fa-magnifying-glass text-gray-400 dark:text-gray-500 text-2xl"></i>
        </div>
        <h3 class="text-base font-semibold text-gray-900 dark:text-white mb-1" style="font-family:'Syne',sans-serif;">No results found</h3>
        <p class="text-sm text-gray-400 dark:text-gray-500">Try searching with a different field or keyword</p>
      </div>

      <!-- Pagination -->
      <div data-th-if="${pageContacts.totalElements>0}"
           class="flex items-center justify-between px-5 py-4 border-t border-gray-100 dark:border-gray-700/40">

        <p class="text-xs text-gray-400 dark:text-gray-500">
          Page <span class="font-semibold text-gray-700 dark:text-gray-300" data-th-text="${pageContacts.number + 1}"></span>
          of <span class="font-semibold text-gray-700 dark:text-gray-300" data-th-text="${pageContacts.totalPages}"></span>
        </p>

        <nav class="flex items-center gap-1">
          <a data-th-unless="${pageContacts.first}"
             data-th-href="@{'/user/contacts/search?size='+${pageSize}+'&page='+${pageContacts.number-1}+'&field='+${contactSearchForm.field}+'&value='+${contactSearchForm.value}}"
             class="px-3 py-1.5 text-xs font-semibold text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-[#4F6EF7]/10 hover:text-[#4F6EF7] rounded-lg transition-colors duration-200">
            ← Previous
          </a>

          <a data-th-each="index : ${#numbers.sequence(0, pageContacts.totalPages-1)}"
             data-th-href="@{'/user/contacts/search?size='+${pageSize}+'&page='+${index}+'&field='+${contactSearchForm.field}+'&value='+${contactSearchForm.value}}"
             data-th-text="${index + 1}"
             data-th-classappend="${index == pageContacts.number ? 'bg-[#4F6EF7] text-white shadow-sm shadow-[#4F6EF7]/25' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-[#4F6EF7]/10 hover:text-[#4F6EF7]'}"
             class="w-8 h-8 flex items-center justify-center text-xs font-semibold rounded-lg transition-colors duration-200">
          </a>

          <a data-th-unless="${pageContacts.last}"
             data-th-href="@{'/user/contacts/search?size='+${pageSize}+'&page='+${pageContacts.number+1}+'&field='+${contactSearchForm.field}+'&value='+${contactSearchForm.value}}"
             class="px-3 py-1.5 text-xs font-semibold text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-[#4F6EF7]/10 hover:text-[#4F6EF7] rounded-lg transition-colors duration-200">
            Next →
          </a>
        </nav>

      </div>

    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
</body>
</html>

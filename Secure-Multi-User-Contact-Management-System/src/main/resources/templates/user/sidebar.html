      <li>
        <a data-th-href="@{'/user/contacts/add'}"

          <svg class="w-5 h-5 flex-shrink-0 group-hover:text-[#4F6EF7]" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">

      <p class="text-xs text-gray-400 dark:text-gray-500 text-center">ContactVault &copy; 2025</p>

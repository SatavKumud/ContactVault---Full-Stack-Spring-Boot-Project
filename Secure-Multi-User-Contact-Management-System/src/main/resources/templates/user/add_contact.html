<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{:: #content}, ~{:: title})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add contacts page</title>
    <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
    <link rel="stylesheet" data-th-href="@{'/css/output.css'}">
</head>
<body>

<div id="content">

  <!-- Sidebar -->
  <div th:if="${loggedInUser}">
    <div th:replace="~{user/sidebar :: sidebar}"></div>
  </div>

  <!-- Main Content -->
  <div class="p-6 pt-8">

    <!-- Page Header -->
    <div class="mb-6">
      <div class="flex items-center gap-2 mb-1">
        <a data-th-href="@{'/user/contacts'}" class="text-sm text-gray-400 dark:text-gray-500 hover:text-[#4F6EF7] transition-colors">
          Contacts
        </a>
        <i class="fa-solid fa-chevron-right text-gray-300 dark:text-gray-600 text-xs"></i>
        <span class="text-sm text-gray-600 dark:text-gray-300 font-medium">Add New</span>
      </div>
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white" style="font-family:'Syne',sans-serif;">Add New Contact</h1>
      <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">This contact will be stored on cloud. You can directly email this client from ContactVault.</p>
    </div>

    <!-- Message Box -->
    <div data-th-replace="message :: messagebox"></div>

    <!-- Form Card -->
    <div class="bg-white dark:bg-gray-800/60 rounded-2xl border border-gray-100 dark:border-gray-700/40 shadow-sm p-6 max-w-3xl">

      <form data-th-action="@{'/user/contacts/add'}"
            method="post"
            data-th-object="${contactForm}"
            novalidate
            enctype="multipart/form-data">

        <div class="grid gap-5 md:grid-cols-2">

          <!-- Contact Name -->
          <div>
            <label class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">Contact Name</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
                <i class="fa-solid fa-user text-gray-400 text-sm"></i>
              </div>
              <input type="text" data-th-field="*{name}" placeholder="Enter name" required
                     class="bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 text-gray-900 dark:text-white text-sm rounded-xl focus:ring-2 focus:ring-[#4F6EF7] focus:border-[#4F6EF7] block w-full pl-10 pr-4 py-2.5 placeholder-gray-400 dark:placeholder-gray-500 transition-colors duration-200">
            </div>
            <p class="text-red-500 text-xs mt-1.5 px-1"
               data-th-if="${#fields.hasErrors('name')}"
               data-th-errors="*{name}">Invalid Name</p>
          </div>

          <!-- Contact Email -->
          <div>
            <label class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">Contact Email</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
                <i class="fa-solid fa-envelope text-gray-400 text-sm"></i>
              </div>
              <input type="email" data-th-field="*{email}" placeholder="xyz@gmail.com" required
                     class="bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 text-gray-900 dark:text-white text-sm rounded-xl focus:ring-2 focus:ring-[#4F6EF7] focus:border-[#4F6EF7] block w-full pl-10 pr-4 py-2.5 placeholder-gray-400 dark:placeholder-gray-500 transition-colors duration-200">
            </div>
            <p class="text-red-500 text-xs mt-1.5 px-1"
               data-th-if="${#fields.hasErrors('email')}"
               data-th-errors="*{email}">Invalid Email</p>
          </div>

          <!-- Phone Number -->
          <div>
            <label class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">Phone Number</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
                <i class="fa-solid fa-phone text-gray-400 text-sm"></i>
              </div>
              <input type="text" data-th-field="*{phoneNumber}" placeholder="123-45-678" pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}"
                     class="bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 text-gray-900 dark:text-white text-sm rounded-xl focus:ring-2 focus:ring-[#4F6EF7] focus:border-[#4F6EF7] block w-full pl-10 pr-4 py-2.5 placeholder-gray-400 dark:placeholder-gray-500 transition-colors duration-200">
            </div>
            <p class="text-red-500 text-xs mt-1.5 px-1"
               data-th-if="${#fields.hasErrors('phoneNumber')}"
               data-th-errors="*{phoneNumber}">Invalid Phone number</p>
          </div>

          <!-- Website Link -->
          <div>
            <label class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">Website Link</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
                <i class="fa-solid fa-link text-gray-400 text-sm"></i>
              </div>
              <input type="text" data-th-field="*{websiteLink}" placeholder="https://xyz.com"
                     class="bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 text-gray-900 dark:text-white text-sm rounded-xl focus:ring-2 focus:ring-[#4F6EF7] focus:border-[#4F6EF7] block w-full pl-10 pr-4 py-2.5 placeholder-gray-400 dark:placeholder-gray-500 transition-colors duration-200">
            </div>
          </div>

          <!-- LinkedIn Link -->
          <div>
            <label class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">LinkedIn Link</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
                <i class="fa-brands fa-linkedin text-gray-400 text-sm"></i>
              </div>
              <input type="text" data-th-field="*{linkedInLink}" placeholder="https://linkedin.com/in/..."
                     class="bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 text-gray-900 dark:text-white text-sm rounded-xl focus:ring-2 focus:ring-[#4F6EF7] focus:border-[#4F6EF7] block w-full pl-10 pr-4 py-2.5 placeholder-gray-400 dark:placeholder-gray-500 transition-colors duration-200">
            </div>
          </div>

          <!-- Address -->
          <div class="md:col-span-2">
            <label class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">Contact Address</label>
            <textarea rows="2" data-th-field="*{address}" placeholder="Write contact's address..."
                      class="bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 text-gray-900 dark:text-white text-sm rounded-xl focus:ring-2 focus:ring-[#4F6EF7] focus:border-[#4F6EF7] block w-full p-3 placeholder-gray-400 dark:placeholder-gray-500 transition-colors duration-200 resize-none"></textarea>
            <p class="text-red-500 text-xs mt-1.5 px-1"
               data-th-if="${#fields.hasErrors('address')}"
               data-th-errors="*{address}">Enter address</p>
          </div>

          <!-- Description -->
          <div class="md:col-span-2">
            <label class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">Contact Description</label>
            <textarea rows="3" data-th-field="*{description}" placeholder="Write something about your contact..."
                      class="bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 text-gray-900 dark:text-white text-sm rounded-xl focus:ring-2 focus:ring-[#4F6EF7] focus:border-[#4F6EF7] block w-full p-3 placeholder-gray-400 dark:placeholder-gray-500 transition-colors duration-200 resize-none"></textarea>
          </div>

          <!-- Contact Image -->
          <div class="md:col-span-2">
            <label class="block mb-2 text-sm font-medium text-gray-700 dark:text-gray-300">Contact Image</label>
            <input type="file" id="image_file_input" data-th-field="*{contactImage}"
                   class="block w-full text-sm text-gray-500 dark:text-gray-400
                          file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0
                          file:text-sm file:font-semibold file:bg-[#4F6EF7]/10 file:text-[#4F6EF7]
                          hover:file:bg-[#4F6EF7]/20 cursor-pointer
                          bg-gray-50 dark:bg-gray-700/50 border border-gray-200 dark:border-gray-600 rounded-xl
                          focus:outline-none transition-colors duration-200">
            <img class="mt-4 rounded-xl shadow-sm max-h-48 mx-auto border border-gray-100 dark:border-gray-700" src="" id="upload_image_preview" alt="">
            <p class="text-red-500 text-xs mt-1.5 px-1"
               data-th-if="${#fields.hasErrors('contactImage')}"
               data-th-errors="*{contactImage}"></p>
          </div>

          <!-- Favourite Checkbox -->
          <div class="md:col-span-2">
            <label class="flex items-center gap-3 cursor-pointer group">
              <input data-th-field="*{favorite}" type="checkbox"
                     class="w-4 h-4 rounded border-gray-300 dark:border-gray-600 text-[#4F6EF7] focus:ring-[#4F6EF7] focus:ring-2 bg-gray-50 dark:bg-gray-700">
              <span class="text-sm font-medium text-gray-700 dark:text-gray-300 group-hover:text-[#4F6EF7] transition-colors">
                <i class="fa-solid fa-star text-amber-400 mr-1"></i> Mark as favourite contact
              </span>
            </label>
          </div>

          <!-- Buttons -->
          <div class="md:col-span-2 flex gap-3 pt-2 border-t border-gray-100 dark:border-gray-700/40 mt-2">
            <button type="submit"
                    class="inline-flex items-center gap-2 px-6 py-2.5 text-sm font-semibold text-white bg-[#4F6EF7] hover:bg-[#3B57E0] rounded-xl shadow-md shadow-[#4F6EF7]/25 transition-all duration-200">
              <i class="fa-solid fa-user-plus text-xs"></i> Add Contact
            </button>
            <button type="reset"
                    class="px-5 py-2.5 text-sm font-semibold text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-xl transition-colors duration-200">
              Reset
            </button>
          </div>

        </div>
      </form>
    </div>
  </div>

  <script data-th-src="@{'/js/admin.js'}"></script>

</div>

</body>
</html>

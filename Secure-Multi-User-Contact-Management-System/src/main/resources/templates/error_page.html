<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{:: #content}, ~{:: title})}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>email error page</title>
  <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
  <link rel="stylesheet" data-th-href="@{'/css/output.css'}">
</head>
<body>

<div id="content" class="min-h-screen flex items-center justify-center px-4 bg-gray-50 dark:bg-[#0B0F1A]">

  <style>
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    .shake{animation:shake 0.5s ease 0.3s both}
    .fade-up{animation:fadeUp 0.6s ease both}
    .fade-up-1{animation:fadeUp 0.6s 0.15s ease both}
    .fade-up-2{animation:fadeUp 0.6s 0.3s ease both}
  </style>

  <!-- Background orbs -->
  <div class="absolute top-20 right-20 w-72 h-72 bg-red-400/10 dark:bg-red-500/10 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-20 left-20 w-56 h-56 bg-rose-400/10 dark:bg-rose-500/10 rounded-full blur-3xl pointer-events-none"></div>

  <div class="relative text-center max-w-md w-full">

    <!-- Icon -->
    <div class="fade-up flex items-center justify-center mb-6">
      <div class="shake w-24 h-24 rounded-3xl bg-red-50 dark:bg-red-900/20 border border-red-100 dark:border-red-800/40 flex items-center justify-center shadow-lg">
        <i class="fa-solid fa-circle-exclamation text-red-500 text-5xl"></i>
      </div>
    </div>

    <!-- Message -->
    <div class="fade-up-1 mb-6">
      <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2" style="font-family:'Syne',sans-serif;">Something went wrong</h1>
      <p class="text-gray-500 dark:text-gray-400 text-sm">An error occurred while processing your request. Please check the details below.</p>
    </div>

    <!-- Message Box from session -->
    <div class="fade-up-2 mb-6">
      <div data-th-replace="message :: messagebox"></div>
    </div>

    <!-- Actions -->
    <div class="fade-up-2 flex flex-col sm:flex-row gap-3 justify-center">
      <a data-th-href="@{'/home'}"
         class="inline-flex items-center justify-center gap-2 px-5 py-2.5 text-sm font-semibold text-white bg-[#4F6EF7] hover:bg-[#3B57E0] rounded-xl shadow-md shadow-[#4F6EF7]/25 transition-all duration-200">
        <i class="fa-solid fa-house text-xs"></i> Go Home
      </a>
      <a onclick="history.back()"
         class="inline-flex items-center justify-center gap-2 px-5 py-2.5 text-sm font-semibold text-gray-600 dark:text-gray-300 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl hover:border-[#4F6EF7] transition-all duration-200 cursor-pointer shadow-sm">
        <i class="fa-solid fa-arrow-left text-xs"></i> Go Back
      </a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{:: #content}, ~{:: title})}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email success page</title>
  <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
  <link rel="stylesheet" data-th-href="@{'/css/output.css'}">
</head>
<body>

<div id="content" class="min-h-screen flex items-center justify-center px-4 bg-gray-50 dark:bg-[#0B0F1A]">

  <style>
    @keyframes popIn { 0%{transform:scale(0.5);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
    @keyframes checkDraw { from{stroke-dashoffset:100} to{stroke-dashoffset:0} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse-ring { 0%{transform:scale(0.9);opacity:0.6} 100%{transform:scale(1.4);opacity:0} }
    .pop-in{animation:popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275) 0.2s both}
    .fade-up-1{animation:fadeUp 0.6s 0.4s ease both}
    .fade-up-2{animation:fadeUp 0.6s 0.55s ease both}
    .pulse-ring{animation:pulse-ring 1.5s ease-out 0.5s infinite}
  </style>

  <!-- Background orbs -->
  <div class="absolute top-20 right-20 w-72 h-72 bg-emerald-400/10 dark:bg-emerald-500/10 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-20 left-20 w-56 h-56 bg-teal-400/10 dark:bg-teal-500/10 rounded-full blur-3xl pointer-events-none"></div>

  <div class="relative text-center max-w-md w-full">

    <!-- Animated Check Icon -->
    <div class="flex items-center justify-center mb-6">
      <div class="relative">
        <!-- Pulse ring -->
        <div class="pulse-ring absolute inset-0 w-24 h-24 rounded-3xl bg-emerald-400/30 dark:bg-emerald-500/20"></div>
        <!-- Icon -->
        <div class="pop-in w-24 h-24 rounded-3xl bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-100 dark:border-emerald-800/40 flex items-center justify-center shadow-lg relative z-10">
          <i class="fa-solid fa-circle-check text-emerald-500 text-5xl"></i>
        </div>
      </div>
    </div>

    <!-- Message -->
    <div class="fade-up-1 mb-6">
      <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-2" style="font-family:'Syne',sans-serif;">All done!</h1>
      <p class="text-gray-500 dark:text-gray-400 text-sm">Your action was completed successfully. Check the details below.</p>
    </div>

    <!-- Message Box from session -->
    <div class="fade-up-1 mb-6">
      <div data-th-replace="message :: messagebox"></div>
    </div>

    <!-- Actions -->
    <div class="fade-up-2 flex flex-col sm:flex-row gap-3 justify-center">
      <a data-th-href="@{'/user/dashboard'}"
         class="inline-flex items-center justify-center gap-2 px-5 py-2.5 text-sm font-semibold text-white bg-[#4F6EF7] hover:bg-[#3B57E0] rounded-xl shadow-md shadow-[#4F6EF7]/25 transition-all duration-200">
        <i class="fa-solid fa-gauge text-xs"></i> Go to Dashboard
      </a>
      <a data-th-href="@{'/user/contacts'}"
         class="inline-flex items-center justify-center gap-2 px-5 py-2.5 text-sm font-semibold text-gray-600 dark:text-gray-300 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl hover:border-[#4F6EF7] transition-all duration-200 shadow-sm">
        <i class="fa-solid fa-users text-xs"></i> View Contacts
      </a>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.js"></script>
</body>
</html>
